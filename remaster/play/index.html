<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bubbles — play</title>
    <meta name="description" content="Pop fruit bubbles before time runs out." />
    <link rel="icon" href="/art/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bubbles — pop the fruit, beat the clock" />
    <meta property="og:description" content="Pop fruit bubbles before time runs out. Can you beat my score?" />
    <meta property="og:url" content="%VITE_SITE_URL%/play/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og/share.png" />
    <style>
      * { margin: 0; padding: 0; }
      html, body {
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #0a4d6e 0%, #0e7f9e 45%, #35d0ba 100%);
      }
      #bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
      #game { position: relative; height: 100%; z-index: 1; }
      /* knife cursor on devices with a mouse; hotspot at the blade tip */
      @media (pointer: fine) {
        #game canvas { cursor: url("/art/knife.svg") 3 3, pointer; }
      }
      #foot {
        position: fixed; bottom: 0; left: 0; right: 0; z-index: 2;
        display: flex; gap: 18px; align-items: center; justify-content: center;
        padding: 6px 10px; font: 13px system-ui, sans-serif; color: #e8f1f7;
        background: rgba(3, 41, 61, 0.55);
      }
      #foot a { color: #fff; }
      #foot button {
        background: none; border: 1px solid rgba(255, 255, 255, 0.5); color: #fff;
        border-radius: 999px; padding: 3px 12px; cursor: pointer; font-size: 12px;
      }
    </style>
  </head>
  <body>
    <canvas id="bg" aria-hidden="true"></canvas>
    <div id="game"></div>
    <div id="lang-sel" style="position: fixed; top: 12px; right: 14px; z-index: 2"></div>
    <footer id="foot">
      <a data-i18n="madeBy" href="https://www.linkedin.com/in/enrique-magallon/" target="_blank" rel="noopener"></a>
      <a href="https://github.com/Devace-93/bubbles" data-i18n="source"></a>
      <a href="%VITE_INFO_URL%">info.3m4.net</a>
      <button id="share-btn" type="button" data-i18n="share"></button>
    </footer>
    <script type="module" src="/src/game/main.ts"></script>
  </body>
</html>
