<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Bubbles — play</title>
    <meta name="description" content="Pop fruit bubbles before time runs out." />
    <link rel="icon" href="/art/blackberry.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bubbles — pop the fruit, beat the clock" />
    <meta property="og:description" content="Pop fruit bubbles before time runs out. Can you beat my score?" />
    <meta property="og:url" content="https://bubbles.3m4.net/play/" />
    <meta property="og:image" content="https://bubbles.3m4.net/og/share.png" />
    <style>
      * { margin: 0; padding: 0; }
      html, body {
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #0a4d6e 0%, #0e7f9e 45%, #35d0ba 100%);
      }
      #bg { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
      #game { position: relative; height: 100%; z-index: 1; }
      /* knife cursor on devices with a mouse; hotspot at the blade tip */
      @media (pointer: fine) {
        #game canvas { cursor: url("/art/knife.svg") 3 3, pointer; }
      }
    </style>
  </head>
  <body>
    <canvas id="bg" aria-hidden="true"></canvas>
    <div id="game"></div>
    <script type="module" src="/src/game/main.ts"></script>
  </body>
</html>
